[dronecot]
; DroneCOT example configuration. Parameters use ALL CAPS (PyTAK convention).

; --- Input feed (selects worker by URL scheme) ---
; MQTT example:
FEED_URL = mqtt://broker.example.net:1883
; Serial MAVLink:
; FEED_URL = serial:///dev/ttyACM0:115200
; Wi-Fi monitor mode:
; FEED_URL = wifi://wlan0
; BLE (Sniffle dongle):
; FEED_URL = ble://auto
; Wi-Fi + BLE together:
; FEED_URL = wireless://wlan0

; --- CoT output (required for TAK) ---
COT_URL = udp+wo://239.2.3.1:6969

; --- MQTT (when FEED_URL contains mqtt) ---
MQTT_TOPIC = #
; MQTT_USERNAME =
; MQTT_PASSWORD =
; MQTT_CLIENT_ID = dronecot_example
; MQTT_TLS_CLIENT_CERT = certs/client.pem
; MQTT_TLS_CLIENT_KEY = certs/client.key
; MQTT_TLS_CLIENT_CAFILE = certs/ca.pem
; MQTT_TLS_DONT_VERIFY = 0
; MQTT_TLS_DONT_CHECK_HOSTNAME = 0

; --- Serial (optional overrides when FEED_URL contains serial) ---
; SERIAL_PORT = /dev/ttyACM0
; SERIAL_BAUD_RATE = 115200

; --- Wi-Fi (when FEED_URL contains wifi or wireless) ---
; WIFI_INTERFACE = wlan0
; WIFI_CHANNEL = 6
; WIFI_HOP_CHANNELS = 6,149
; WIFI_HOP_DWELL = 3,1
; WIFI_PCAP = /path/to/replay.pcapng

; --- BLE (when FEED_URL contains ble or wireless) ---
; BLE_SERIAL = /dev/ttyUSB0
; BLE_BAUD_RATE = 2000000
; BLE_LONG_RANGE = 1
; BLE_EXTENDED = 1

; --- CoT identity / types ---
; SENSOR_ID = dronecot_myhost
SENSOR_COT_TYPE = a-f-G-E-S-E
OP_COT_TYPE = a-u-G
UAS_COT_TYPE = a-u-A-M-H-Q
; COT_STALE = 3600
; COT_HOST_ID =

; --- Sensor status (gpspipe when position not in feed) ---
GPS_INFO_CMD = gpspipe --json -n 5

; --- PyTAK transport / TLS (TAK Server) — see https://pytak.rtfd.io/en/latest/configuration/ ---
; PYTAK_TLS_CLIENT_CERT =
; PYTAK_TLS_CLIENT_KEY =
; DEBUG = 0
; ENABLE_RX_MOCK = 0
